href='data:,
	I intended for this HTML file to work offline. A URL like 
	"file:///note.html?no-title" is bookmarked in my web browser and I use it 
	almost daily. 

	Instead of downloading this file, you could also bookmark an HTML data URI. 
	Running the JavaScript code "replaceNote()" in the browser console will 
	overwrite the contents of the note with a data URI containing this document. 

	The rel="alternate" link below is a much simpler HTML data URI. A few years 
	ago I saw a link similar to that one, bookmarked it, and used it enough to 
	eventually write this replacement.
'/><link

href="data:text/html;charset=utf-8,%3C!DOCTYPE%20html%3E%3Chtml%0Acontenteditable='plaintext-only'%0Alang='en'%0Astyle='color-scheme:light%20dark;font-family:monospace;line-height:1.4;padding:4rem;'%3E%3Cmeta%0Acharset='utf-8'%3E%3Ctitle%3EUnsaved%20Note%3C/title%3E"
/><link

content='A text area for temporary notes with a copy to data URI feature.'
/><meta
name='viewport'
content='width=device-width'
/><style>
body {
	font-family: monospace;
	margin: 0px;
	position: relative;
}
#note {
	line-height: 1.4;
	margin: 0px;
	min-height: calc(100vh - 8rem);
	overflow-wrap: break-word;
	overflow-x: auto;
	padding: 4rem;
}
@media only screen and (max-width: 450px) {
	#note {
		font-size: 16pt;
	}
}
#notice {
	margin: 0px;
	position: absolute;
	right: 1rem;
	top: 1rem;
	transition: opacity 0.2s ease-out;
}
</style></head>

<body><p
id='note'
contenteditable='plaintext-only'
style='
	white-space: pre-wrap;
'>Press Alt or Option to toggle text wrapping, and Control+C or Command+C for a data URI containing the text. Add "?no-title" to this page's URL to keep this message from appearing. View source for more information.</p><p
id='notice'
style='
	opacity: 0;
	z-index: -1;
'>Copied data URI to clipboard</p><script>
const note = document.getElementById("note");
const notice = document.getElementById("notice");
let noClipboard = false;
if (new URLSearchParams(window.location.search).get("no-title") !== null) {
	note.replaceChildren();
}
if (!note.isContentEditable) {
	note.contentEditable = "true";
}
note.focus();
document.addEventListener("keydown", function (event) {
	if (event.altKey) {
		note.style.whiteSpace = (note.style.whiteSpace == "pre") ? "pre-wrap" : "pre";
		return;
	}
	if (event.key.toLowerCase() != "c") {
		return;
	}
	if (!(event.ctrlKey || event.metaKey)) {
		return;
	}
	if (window.getSelection().toString().length != 0) {
		return;
	}
	const txt = "data:text/plain;charset=utf-8," + encodeURI(note.textContent).replaceAll("#", "%23");
	if (!navigator.clipboard || noClipboard) {
		let a;
		if (notice.children.length === 0) {
			notice.replaceChildren();
			a = document.createElement("a");
			a.textContent = "Copy this link to a data URI";
			notice.appendChild(a);
			notice.style.opacity = "1";
			notice.style.zIndex = "1";
			noClipboard = true;
		} else {
			a = notice.children[0];
		}
		a.setAttribute("href", txt);
		return;
	}
	navigator.clipboard.writeText(txt);
	notice.style.opacity = "1";
	setTimeout(function () {
		notice.style.opacity = "0";
	}, 1800);
});
function replaceNote() {
	note.textContent = "data:text/html;charset=utf-8,%3C!DOCTYPE%20html%3E"
		+ encodeURI(document.documentElement.outerHTML).replaceAll("#", "%23");
}
</script></body>
