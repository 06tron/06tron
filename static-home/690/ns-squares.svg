<title>Number Space: Two Squares</title>
<style>
	#bl, #or { dominant-baseline: middle; text-anchor: middle; }
	text, p { font: 4px sans-serif; }
	p { color: Black; line-height: 1.3; margin: 0 5px; }
	p.url { letter-spacing: 0.3px; }
	p.gap { margin-top: 3px; }
	p a { color: Black; }
	@media print {
		#shading { display: none; }
		p a { text-decoration: none; }
	}
	@page { margin-top: -0.2in; } /* for Safari */
</style>
<metadata>
<about xmlns="https://6t.lt/about">
	First drawn in October or November 2025, then converted to SVG. The CSS is set up for print output, but it doesn't always work. Firefox made a blurry PDF, Edge was good, Safari was also good.
</about>
</metadata>
